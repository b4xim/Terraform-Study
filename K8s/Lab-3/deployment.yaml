apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-nodeapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nodeapp
  template:
    metadata:
        name: nodeapp-cluster
        labels: 
          app: nodeapp
    spec:
      containers:
        - name: nodeapp
          image: b4xim/nodeapp:v1
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nodeapp-config
            - secretRef:
                name: nodeapp-secret